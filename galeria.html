<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Galería de Peinados Nupciales | Magaby Hairstyle</title>
  <meta name="description" content="Explora el portafolio de Magaby Hairstyle. Peinados de alta costura para novias de destino, bodas eclesiásticas y civiles en Panamá.">

  <link rel="alternate" hreflang="es" href="https://magabyhairstyle.com/galeria.html" />
  <link rel="alternate" hreflang="en" href="https://magabyhairstyle.com/en/galeria.html" />
  <link rel="alternate" hreflang="x-default" href="https://magabyhairstyle.com/galeria.html" />

  <link rel="icon" href="/images/web.png?v=2" sizes="96x96" type="image/png">
  <link rel="stylesheet" href="/styles.css">

  <style>
    .nav-logo, .nav-links, .lang-switch, .hamburger {
      animation-delay: 0s !important;
      opacity: 1 !important;
      animation: none !important;
    }
    .gal-loading {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 1rem;
      gap: 1rem;
      color: rgba(255,255,255,0.3);
      font-size: 0.88rem;
      width: 100%;
    }
    .gal-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(201,169,110,0.15);
      border-top-color: rgba(201,169,110,0.7);
      border-radius: 50%;
      animation: galSpin 0.75s linear infinite;
    }
    @keyframes galSpin { to { transform: rotate(360deg); } }
    .gal-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 1rem;
      color: rgba(255,255,255,0.3);
      font-style: italic;
      width: 100%;
    }
  </style>
</head>
<body style="background: var(--lila-gris-2);">

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-close" id="mobileClose" aria-label="Cerrar menú">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <a href="/">← Volver al Inicio</a>
    <a href="/#contacto">Reservar</a>
    <div class="mobile-lang">
      <a href="/galeria.html" class="lang-btn active">ES</a>
      <a href="/en/galeria.html" class="lang-btn">EN</a>
    </div>
  </div>

  <nav id="mainNav" class="nav-always-solid">
    <a href="/" class="nav-logo">
      <img src="/images/logo.png" alt="Logo Magaby Hairstyle" class="logo-img">
    </a>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="/">← Volver al Inicio</a></li>
        <li><a href="/#contacto">Reservar</a></li>
      </ul>
      <div class="lang-switch">
        <a href="/galeria.html" class="lang-btn active">ES</a>
        <a href="/en/galeria.html" class="lang-btn">EN</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="gallery" style="padding-top: 10rem; min-height: 100vh;">
    <div class="gallery-header">
      <p class="section-eyebrow reveal" style="color:var(--gold)">Colección Completa</p>
      <h1 class="section-title reveal reveal-delay-1">El arte en<br><em>imágenes</em></h1>
    </div>

    <div class="gallery-filters reveal">
      <button class="filter-btn active" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="eclesiastico">Eclesiástica</button>
      <button class="filter-btn" data-filter="civil">Civil & Exteriores</button>
      <button class="filter-btn" data-filter="hindu">Hindú</button>
      <button class="filter-btn" data-filter="china">China</button>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>
  </section>

  <footer>
    <div class="footer-top">
      <div>
        <div class="footer-brand">
          <span class="logo-text">Magaby Hairstyle</span>
        </div>
        <p class="footer-tagline">La maga de las novias. El arte de peinar es mi forma de honrar la belleza de tu alma.</p>
        <div class="footer-social">
          <a class="social-btn" href="https://instagram.com/magabyhairstyle" target="_blank" aria-label="Instagram">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
          </a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <div class="footer-copyright">© 2026 Magaby Hairstyle. Todos los derechos reservados.</div>
    </div>
  </footer>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </div>
    <img class="lightbox-img" id="lightboxImg" src="" alt="Vista ampliada">
  </div>

  <script src="/script.js" defer></script>
  <script>
  (function () {
    var CAT = { civil: 'Civil', eclesiastico: 'Eclesiástica', hindu: 'Hindú', china: 'China' };
    var ZOOM = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>';
    var grid = document.getElementById('galleryGrid');
    grid.innerHTML = '<div class="gal-loading"><div class="gal-spinner"></div><p>Cargando fotos…</p></div>';

    function revealItems(items) {
      if (!window.IntersectionObserver) {
        items.forEach(function (el) { el.classList.add('visible'); });
        return;
      }
      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
      items.forEach(function (el) { obs.observe(el); });
    }

    fetch('/api/gallery')
      .then(function (r) { return r.json(); })
      .then(function (images) {
        if (!Array.isArray(images) || images.length === 0) {
          grid.innerHTML = '<p class="gal-empty">Pronto aquí habrá fotos increíbles.</p>';
          return;
        }
        grid.innerHTML = '';
        var newItems = [];
        images.forEach(function (img) {
          var cat = (img.tags && img.tags[0]) || 'civil';
          var label = CAT[cat] || cat;
          var item = document.createElement('div');
          item.className = 'gallery-item reveal';
          item.dataset.category = cat;
          item.innerHTML =
            '<img src="' + img.url + '" alt="Peinado ' + label + ' · Magaby Hairstyle" loading="lazy">' +
            '<div class="gallery-overlay">' + ZOOM + '</div>' +
            '<span class="gallery-cat-tag">' + label + '</span>';
          grid.appendChild(item);
          newItems.push(item);
        });
        revealItems(newItems);
      })
      .catch(function () {
        grid.innerHTML = '<p class="gal-empty">Error al cargar las fotos. Recarga la página.</p>';
      });
  })();
  </script>
</body>
</html>
